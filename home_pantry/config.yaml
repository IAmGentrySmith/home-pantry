name: "Home Pantry"
description: "Kitchen Grocery and Pantry Inventory Management with LLM Expiration Dates and Todo Sync."
version: "1.6.0"
slug: "home_pantry"
arch:
  - aarch64
  - amd64
boot: auto
init: false
host_network: false
# Grants access to the Home Assistant Core REST API proxy at http://supervisor/core/api
# (required for the to-do shopping-list sync, the expiring-items sensor, and the
# ha_conversation LLM provider). Defaults to false, so it must be declared explicitly.
homeassistant_api: true
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:basket
panel_title: "Home Pantry"
panel_admin: false
# The web UI is reached through authenticated HA ingress ("Open Web UI" / sidebar panel),
# so no host port is published by default. The port below stays CLOSED unless you enable it
# for the optional Voice Assistant REST commands (Step 4); even then it is gated by api_token.
ports:
  8099/tcp: null
ports_description:
  8099/tcp: "Optional direct API for the Voice Assistant commands and the dashboard scan card (README Steps 4 & 6). Leave the box blank to keep it disabled; type 8099 in the box to publish it, then also set the api_token option. To disable it again later, clear the box and Save. The 8099/tcp label on the right is the add-on's fixed internal port, not something you enter."
# The database now lives on the private /data volume (always mapped, no entry
# needed). /share is mapped READ-ONLY only so the one-time migration can copy a
# database left behind by older versions that stored it under /share/home_pantry.
map:
  - share:ro
options:
  todo_list_entity_id: "todo.shopping_list"
  llm_provider: "none"
  ai_task_entity_id: ""
  ha_agent_id: ""
  llm_api_key: ""
  llm_model: ""
  api_token: ""
  log_level: "info"
schema:
  todo_list_entity_id: str
  llm_provider: list(none|ai_task|ha_conversation|openai|gemini)
  ai_task_entity_id: str?
  ha_agent_id: str?
  llm_api_key: password?
  llm_model: str?
  api_token: password?
  log_level: list(debug|info|warning|error)?
