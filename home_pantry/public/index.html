<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Pantry</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <header>
    <h1>Pantry</h1>
    <div class="actions">
      <button id="btn-scan" class="primary-btn" aria-label="Scan a barcode">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" aria-hidden="true" focusable="false"><path d="M4,6H6V18H4V6M7,6H8V18H7V6M9,6H12V18H9V6M13,6H14V18H13V6M16,6H18V18H16V6M19,6H20V18H19V6M2,4V8H0V4A2,2 0 0,1 2,2H6V4H2M22,2A2,2 0 0,1 24,4V8H22V4H18V2H22M2,16V20H6V22H2A2,2 0 0,1 0,20V16H2M22,20V16H24V20A2,2 0 0,1 22,22H18V20H22Z"/></svg>
        Scan
      </button>
    </div>
  </header>

  <main>
    <section id="dashboard" class="card">
      <h2>Expiring Soon</h2>
      <ul id="expiring-list" class="item-list"></ul>
    </section>

    <section id="inventory" class="card">
      <h2>Inventory</h2>
      <div class="controls">
        <input type="text" id="search" placeholder="Search..." />
        <select id="sort">
          <option value="name">Name</option>
          <option value="expiration">Expiration Date</option>
          <option value="category">Category</option>
        </select>
      </div>
      <ul id="inventory-list" class="item-list"></ul>
    </section>
  </main>

  <!-- Scanner Modal -->
  <div id="scanner-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Scan Barcode</h2>
        <button id="btn-close-scanner" class="icon-btn" aria-label="Close scanner">&times;</button>
      </div>
      <div id="reader"></div>
      <div class="modal-actions">
        <button id="btn-ha-scanner" class="secondary-btn">Use HA Native Scanner</button>
      </div>
    </div>
  </div>

  <!-- Generic form/confirm dialog (replaces native prompt()/confirm()). -->
  <dialog id="form-dialog" class="dialog"></dialog>

  <!-- Vendored locally so the add-on works fully offline and is not subject to
       a third-party CDN or the ingress Content-Security-Policy. -->
  <script src="vendor/html5-qrcode.min.js" type="text/javascript"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
